services:
  - type: web
    name: safereport-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: HF_API_KEY
        sync: false          # set this manually in Render dashboard
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
